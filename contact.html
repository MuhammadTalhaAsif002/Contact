<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – Muhammad Talha Asif</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Arial, sans-serif;
      background: #f6f8ff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 16px;
      padding: 22px 20px 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 1.5rem;
      color: #0f172a;
    }
    .subtitle {
      color: #64748b;
      margin-bottom: 14px;
      font-size: 0.95rem;
    }
    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      margin: 8px 0;
      background: #f8fafc;
      font-size: 0.95rem;
    }
    .label { font-weight: 600; color: #111827; }
    .value, .value a {
      color: #1f4fff;
      text-decoration: none;
      word-break: break-all;
      font-weight: 600;
    }
    .value a:hover { text-decoration: underline; }
    .qr {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px dashed #e5e7eb;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .qr img {
      width: 140px;
      height: 140px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      background: #fff;
    }
    .hint {
      font-size: 0.8rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Muhammad Talha Asif</h1>
    <div class="subtitle">Contact Details</div>

    <div class="item">
      <span class="label">📧 Email</span>
      <span class="value">
        <a href="mailto:muhammadtalhaasif90@gmail.com">muhammadtalhaasif90@gmail.com</a>
      </span>
    </div>

    <div class="item">
      <span class="label">📞 Phone</span>
      <span class="value">
        <a href="tel:+923100402233">+92 310 0402233</a>
      </span>
    </div>

    <div class="item">
      <span class="label">💻 GitHub</span>
      <span class="value">
        <a href="https://github.com/MuhammadTalhaAsif002" target="_blank" rel="noopener">
          github.com/MuhammadTalhaAsif002
        </a>
      </span>
    </div>

    <div class="item">
      <span class="label">💼 LinkedIn</span>
      <span class="value">
        <a href="https://www.linkedin.com/in/muhammad-talha-asif-a00882313" target="_blank" rel="noopener">
          linkedin.com/in/muhammad-talha-asif-a00882313
        </a>
      </span>
    </div>

    <!-- QR Code (auto-generated) -->
    <div class="qr">
      <strong>Scan to open this page</strong>
      <img 
        src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=YOUR-CONTACT-PAGE-URL" 
        alt="QR Code to contact page"
      />
      <div class="hint">Tip: Replace YOUR-CONTACT-PAGE-URL with your hosted page link</div>
    </div>
  </div>
</body>
</html>
